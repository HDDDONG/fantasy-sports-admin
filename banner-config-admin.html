<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>梦幻体育后台中台 - BANNER配置</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #fff;
      --text: #26313d;
      --muted: #7a8795;
      --line: #e2e8f0;
      --line-strong: #cdd7e3;
      --blue: #2f8df5;
      --green: #67bd51;
      --orange: #f3a946;
      --red: #d65a5a;
      --shadow: 0 6px 18px rgba(32, 45, 59, .08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
    button, input, select { font: inherit; }
    .layout { display: grid; grid-template-columns: 220px minmax(0, 1fr); min-height: 100vh; }
    .sidebar { background: #172331; color: #dbe6ef; border-right: 1px solid #0f1823; padding: 16px 12px; }
    .brand { height: 44px; display: flex; align-items: center; gap: 10px; padding: 0 8px 14px; border-bottom: 1px solid rgba(255,255,255,.1); margin-bottom: 14px; }
    .brand-mark { width: 30px; height: 30px; border-radius: 7px; background: var(--blue); color: #fff; display: grid; place-items: center; font-weight: 900; font-size: 12px; }
    .brand-text strong { display: block; font-size: 14px; line-height: 18px; color: #fff; }
    .brand-text span { display: block; color: #93a5b6; font-size: 12px; line-height: 16px; }
    .menu-section { display: grid; gap: 4px; margin-bottom: 8px; }
    .menu-title { height: 38px; border-radius: 8px; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 9px; padding: 0 10px; color: #f4f8fb; background: #203244; font-weight: 800; font-size: 14px; border: 0; width: 100%; cursor: pointer; text-align: left; }
    .menu-title::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 0 4px rgba(47,141,245,.16); }
    .menu-arrow { color: #9fb1c0; transition: transform .22s ease; font-size: 12px; }
    .menu-section.collapsed .menu-arrow { transform: rotate(-90deg); }
    .submenu { display: grid; gap: 3px; padding: 4px 0 0 22px; max-height: 128px; opacity: 1; overflow: hidden; transform: translateY(0); transition: max-height .24s ease, opacity .18s ease, transform .22s ease, padding-top .22s ease; }
    .menu-section.collapsed .submenu { max-height: 0; opacity: 0; padding-top: 0; transform: translateY(-6px); pointer-events: none; }
    .submenu-item { height: 34px; border-radius: 7px; display: flex; align-items: center; padding: 0 10px; color: #b9c8d5; text-decoration: none; font-size: 13px; }
    .submenu-item.active { color: #fff; background: var(--blue); box-shadow: 0 6px 14px rgba(47,141,245,.22); }

    .shell { min-width: 0; min-height: 100vh; padding: 14px 18px 24px; background: linear-gradient(#f9fbfd 0, #f9fbfd 72px, transparent 72px), var(--bg); }
    .frame { min-width: 0; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
    .topbar { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; border-bottom: 1px solid var(--line); background: #fbfdff; }
    .crumbs { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; }
    .menu-icon { width: 22px; height: 22px; display: grid; place-items: center; color: #4f5c68; font-weight: 800; font-size: 18px; }
    .module-btn { height: 26px; padding: 0 12px; border-radius: 14px; border: 1px solid var(--line); background: #fff; color: #607080; cursor: pointer; font-size: 12px; }
    .tabs { height: 36px; display: flex; align-items: center; gap: 6px; padding: 0 16px; border-bottom: 1px solid var(--line); background: #fff; }
    .tab { height: 24px; border-radius: 13px; border: 1px solid var(--line); background: #fff; padding: 0 8px 0 12px; color: #657386; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
    .tab-link { color: inherit; text-decoration: none; line-height: 22px; }
    .tab-close { width: 16px; height: 16px; border: 0; border-radius: 50%; background: transparent; color: inherit; cursor: pointer; display: inline-grid; place-items: center; padding: 0; font-size: 12px; line-height: 16px; }
    .tab-close:hover { background: rgba(38, 49, 61, .1); }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .filter-band { padding: 10px 18px; border-bottom: 1px solid var(--line); background: #fbfcfe; }
    .filters { display: flex; align-items: center; gap: 18px; white-space: nowrap; overflow-x: auto; padding-bottom: 2px; }
    .label { color: #5b6775; font-weight: 700; font-size: 11px; text-align: right; white-space: nowrap; }
    .filter-item { display: grid; grid-template-columns: auto 170px; align-items: center; gap: 8px; min-width: max-content; }
    .filter-item.date { grid-template-columns: auto 220px; }
    .filter-actions { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
    .field { height: 30px; border: 1px solid var(--line-strong); background: #fff; border-radius: 7px; padding: 0 10px; min-width: 0; color: var(--text); outline: none; font-size: 12px; }
    .field::placeholder { color: #b3beca; font-size: 12px; }
    .field:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(47, 141, 245, .12); }
    .btn { height: 30px; border: 1px solid var(--line-strong); background: #fff; color: var(--text); border-radius: 7px; padding: 0 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; font-size: 12px; }
    .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 5px 12px rgba(47, 141, 245, .2); }
    .toolbar { padding: 14px 18px 12px; background: #fff; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line); }
    .pill-btn { height: 30px; border: 1px solid transparent; border-radius: 8px; padding: 0 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .pill-btn.green { background: #edf9e9; color: var(--green); border-color: #cfeec7; }
    .table-wrap { max-width: 100%; padding: 0 18px 18px; background: #fff; overflow: auto; max-height: calc(100vh - 248px); }
    table { width: 100%; border-collapse: collapse; min-width: 1760px; font-size: 13px; }
    th, td { border: 1px solid var(--line); padding: 10px 10px; text-align: center; vertical-align: middle; white-space: nowrap; }
    th { position: sticky; top: 0; z-index: 2; background: #f8fafc; color: #566374; font-weight: 800; }
    tbody tr:hover td { background: #fbfdff; }
    .muted { color: var(--muted); }
    .banner-name { text-align: left; max-width: 190px; overflow: hidden; text-overflow: ellipsis; }
    .banner-thumb { width: 126px; height: 34px; margin: 0 auto; border-radius: 5px; display: grid; place-items: center; color: #fff; font-size: 12px; font-weight: 900; border: 1px solid rgba(255,255,255,.25); box-shadow: inset 0 0 0 1px rgba(255,255,255,.18); }
    .banner-thumb.blue { background: linear-gradient(135deg, #2f8df5, #58d0ff); }
    .banner-thumb.green { background: linear-gradient(135deg, #23a36f, #9be15d); }
    .banner-thumb.orange { background: linear-gradient(135deg, #f3a946, #ff6f61); }
    .banner-thumb.dark { background: linear-gradient(135deg, #1b2736, #7c3aed); }
    .tag { display: inline-flex; align-items: center; justify-content: center; min-width: 52px; height: 24px; padding: 0 8px; border-radius: 6px; font-size: 12px; border: 1px solid transparent; font-weight: 800; }
    .tag.green { color: #0c6b3f; background: #c9f2da; border-color: #7ed8a2; }
    .tag.gray { color: #52606c; background: #e7ecf1; border-color: #cbd5df; }
    .tag.blue { color: #1557b0; background: #cfe6ff; border-color: #7eb9ff; }
    .tag.orange { color: #9c5c0d; background: #ffe6bd; border-color: #f5c070; }
    .op { border: 0; background: transparent; padding: 0 7px; font-weight: 800; cursor: pointer; }
    .op.edit { color: var(--blue); }
    .op.toggle { color: var(--orange); }
    .op.delete { color: var(--red); }
    .summary { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-top: 1px solid var(--line); color: var(--muted); font-size: 13px; background: #fbfcfe; }
    .pager-left, .pager-center, .pager-right { display: flex; align-items: center; gap: 8px; }
    .page-size, .goto-input { height: 30px; border: 1px solid var(--line); background: #fff; border-radius: 8px; color: #657386; font-size: 12px; text-align: center; }
    .page-size { width: 96px; padding: 0 10px; text-align: left; }
    .goto-input { width: 52px; }
    .page-btn { min-width: 30px; height: 30px; border: 1px solid var(--line); border-radius: 8px; background: #f7f9fc; color: #657386; cursor: pointer; font-size: 12px; font-weight: 700; }
    .page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 4px 10px rgba(47,141,245,.22); }
    .page-btn.ghost { color: #a8b3bf; background: #f3f6fa; }
    .page-ellipsis { color: #657386; font-weight: 800; padding: 0 2px; }
    .toast { position: fixed; right: 22px; bottom: 22px; background: #192533; color: #fff; padding: 12px 14px; border-radius: 8px; box-shadow: var(--shadow); opacity: 0; transform: translateY(70px); transition: all .18s ease; font-size: 13px; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .modal-mask { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; background: rgba(29, 33, 41, .52); padding: 24px; }
    .modal-mask.show { display: flex; }
    .banner-modal { width: min(620px, calc(100vw - 48px)); max-height: calc(100vh - 64px); overflow: auto; background: #fff; border-radius: 12px; box-shadow: 0 18px 48px rgba(29, 33, 41, .22); }
    .modal-head { height: 58px; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; border-bottom: 1px solid var(--line); }
    .modal-head h3 { margin: 0; font-size: 18px; font-weight: 700; color: var(--text); }
    .modal-close { width: 30px; height: 30px; border: 0; border-radius: 8px; background: transparent; color: #9aa6b2; cursor: pointer; font-size: 24px; line-height: 1; }
    .modal-close:hover { background: #f2f5f9; color: var(--text); }
    .modal-body { padding: 18px 22px 8px; display: grid; gap: 16px; }
    .modal-field { display: grid; gap: 8px; }
    .modal-field label { color: #4e5969; font-size: 13px; font-weight: 700; }
    .required { color: #f53f3f; margin-right: 3px; }
    .modal-input { height: 34px; width: 100%; border: 1px solid var(--line-strong); border-radius: 8px; padding: 0 12px; color: var(--text); outline: none; background: #fff; }
    .modal-input::placeholder { color: #b8c2cc; }
    .modal-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(47, 141, 245, .12); }
    .upload-box { width: 148px; height: 148px; border: 1px dashed #cfd8e3; border-radius: 8px; background: #fbfcfe; color: #9aa6b2; display: grid; place-items: center; cursor: pointer; font-size: 42px; line-height: 1; }
    .upload-box:hover { border-color: var(--blue); color: var(--blue); background: #f5faff; }
    .upload-tip { color: #657386; font-size: 12px; }
    .upload-tip strong { color: #f53f3f; font-weight: 700; }
    .date-range-input { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; height: 34px; border: 1px solid var(--line-strong); border-radius: 8px; padding: 0 12px; color: #b8c2cc; }
    .date-range-input input { border: 0; outline: 0; min-width: 0; text-align: center; color: var(--text); background: transparent; }
    .date-range-input input::placeholder { color: #b8c2cc; }
    .date-range-input:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(47, 141, 245, .12); }
    .conditional-field.hidden { display: none; }
    .modal-foot { display: flex; justify-content: flex-end; gap: 12px; padding: 18px 22px 20px; border-top: 1px solid var(--line); }
  </style>
  <link rel="stylesheet" href="arco-overrides.css?v=banner-modal">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">FS</div>
        <div class="brand-text">
          <strong>梦幻体育中台</strong>
          <span>Fantasy Sports</span>
        </div>
      </div>
      <nav class="menu-section" id="matchMenu">
        <button class="menu-title" type="button">
          <span>赛事管理</span>
          <span class="menu-arrow">⌄</span>
        </button>
        <div class="submenu">
          <a class="submenu-item" href="match-list-admin.html">赛事列表</a>
          <a class="submenu-item" href="match-recommend-admin.html">赛事推荐</a>
        </div>
      </nav>
      <nav class="menu-section" id="roomMenu">
        <button class="menu-title" type="button">
          <span>房间管理</span>
          <span class="menu-arrow">⌄</span>
        </button>
        <div class="submenu">
          <a class="submenu-item" href="room-list-admin.html">房间列表</a>
          <a class="submenu-item" href="room-template-admin.html">模板管理</a>
          <a class="submenu-item" href="room-play-type-admin.html">玩法类型</a>
        </div>
      </nav>
      <nav class="menu-section" id="operationMenu">
        <button class="menu-title" type="button">
          <span>运营管理</span>
          <span class="menu-arrow">⌄</span>
        </button>
        <div class="submenu">
          <a class="submenu-item active" href="banner-config-admin.html">BANNER配置</a>
          <a class="submenu-item" href="recommended-team-admin.html">推荐队伍</a>
          <a class="submenu-item" href="robot-management-admin.html">机器人管理</a>
        </div>
      </nav>
      <nav class="menu-section" id="orderMenu">
        <button class="menu-title" type="button">
          <span>赛事注单</span>
          <span class="menu-arrow">⌄</span>
        </button>
        <div class="submenu">
          <a class="submenu-item" href="bet-order-list-admin.html">注单列表</a>
        </div>
      </nav>
    </aside>

    <main class="shell">
      <section class="frame">
        <header class="topbar">
          <div class="crumbs">
            <span class="menu-icon">≡</span>
            <strong>首页</strong>
            <span>/</span>
            <span>运营管理</span>
            <span>/</span>
            <span>BANNER配置</span>
          </div>
          <button class="module-btn">板球</button>
        </header>

        <nav class="tabs">
          <span class="tab"><a class="tab-link" href="match-list-admin.html">首页</a></span>
          <span class="tab"><a class="tab-link" href="match-list-admin.html">赛事列表</a><button class="tab-close" type="button" aria-label="关闭赛事列表">×</button></span>
          <span class="tab"><a class="tab-link" href="match-recommend-admin.html">赛事推荐</a><button class="tab-close" type="button" aria-label="关闭赛事推荐">×</button></span>
          <span class="tab"><a class="tab-link" href="room-list-admin.html">房间列表</a><button class="tab-close" type="button" aria-label="关闭房间列表">×</button></span>
          <span class="tab"><a class="tab-link" href="room-template-admin.html">模板管理</a><button class="tab-close" type="button" aria-label="关闭模板管理">×</button></span>
          <span class="tab"><a class="tab-link" href="room-play-type-admin.html">玩法类型</a><button class="tab-close" type="button" aria-label="关闭玩法类型">×</button></span>
          <span class="tab active"><a class="tab-link" href="banner-config-admin.html">BANNER配置</a><button class="tab-close" type="button" aria-label="关闭BANNER配置">×</button></span>
          <span class="tab"><a class="tab-link" href="recommended-team-admin.html">推荐队伍</a><button class="tab-close" type="button" aria-label="关闭推荐队伍">×</button></span>
          <span class="tab"><a class="tab-link" href="robot-management-admin.html">机器人管理</a><button class="tab-close" type="button" aria-label="关闭机器人管理">×</button></span>
          <span class="tab"><a class="tab-link" href="bet-order-list-admin.html">注单列表</a><button class="tab-close" type="button" aria-label="关闭注单列表">×</button></span>
        </nav>

        <section class="filter-band">
          <div class="filters">
            <label class="filter-item">
              <span class="label">Banner名称</span>
              <input class="field" id="bannerName" placeholder="请输入Banner名称">
            </label>
            <label class="filter-item">
              <span class="label">状态</span>
              <select class="field" id="bannerStatus">
                <option value="">请选择状态</option>
                <option value="online">上架</option>
                <option value="offline">下架</option>
              </select>
            </label>
            <label class="filter-item date">
              <span class="label">日期范围</span>
              <input class="field" id="dateRange" placeholder="开始日期  -  结束日期">
            </label>
            <div class="filter-actions">
              <button class="btn primary" id="searchBtn">搜索</button>
              <button class="btn" id="resetBtn">重置</button>
            </div>
          </div>
        </section>

        <section class="toolbar">
          <button class="pill-btn green" id="addBannerBtn">新增</button>
        </section>

        <section class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>序号</th>
                <th>租户</th>
                <th>Banner名称</th>
                <th>Banner图片</th>
                <th>跳转类型</th>
                <th>开始时间</th>
                <th>结束时间</th>
                <th>状态</th>
                <th>修改人</th>
                <th>修改时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </section>

        <footer class="summary">
          <div class="pager-left">
            <span id="countText">共 0 条数据</span>
            <select class="page-size" aria-label="每页条数">
              <option>10条/页</option>
              <option selected>20条/页</option>
              <option>50条/页</option>
            </select>
          </div>
          <div class="pager-center">
            <button class="page-btn ghost" type="button">‹</button>
            <button class="page-btn active" type="button">1</button>
            <button class="page-btn" type="button">2</button>
            <button class="page-btn" type="button">3</button>
            <button class="page-btn" type="button">4</button>
            <button class="page-btn" type="button">5</button>
            <button class="page-btn" type="button">6</button>
            <span class="page-ellipsis">•••</span>
            <button class="page-btn" type="button">136</button>
            <button class="page-btn ghost" type="button">›</button>
          </div>
          <div class="pager-right">
            <span>前往</span>
            <input class="goto-input" value="1" aria-label="前往页码">
            <span>页</span>
          </div>
        </footer>
      </section>
    </main>
  </div>

  <div class="modal-mask" id="bannerModal" aria-hidden="true">
    <section class="banner-modal" role="dialog" aria-modal="true" aria-labelledby="bannerModalTitle">
      <header class="modal-head">
        <h3 id="bannerModalTitle">新增Banner</h3>
        <button class="modal-close" id="bannerModalClose" type="button" aria-label="关闭">×</button>
      </header>
      <div class="modal-body">
        <div class="modal-field">
          <label><span class="required">*</span>Banner名称</label>
          <input class="modal-input" id="modalBannerName" placeholder="请输入Banner名称">
        </div>
        <div class="modal-field">
          <label><span class="required">*</span>Banner图片</label>
          <label class="upload-box" for="bannerImageInput" id="bannerUploadBox">＋</label>
          <input id="bannerImageInput" type="file" accept="image/png,image/jpeg,image/webp" hidden>
          <div class="upload-tip">请上传 大小不超过 <strong>5MB</strong> 格式为 <strong>png/jpg/jpeg/webp</strong> 的文件</div>
        </div>
        <div class="modal-field">
          <label><span class="required">*</span>跳转配置</label>
          <select class="modal-input" id="modalJumpType">
            <option value="none">无跳转</option>
            <option value="activity">跳转落地页</option>
            <option value="match">跳转比赛页</option>
            <option value="room">跳转房间</option>
          </select>
        </div>
        <div class="modal-field conditional-field hidden" id="linkField">
          <label>链接地址</label>
          <input class="modal-input" id="modalLinkUrl" placeholder="请输入链接地址">
        </div>
        <div class="modal-field conditional-field hidden" id="matchField">
          <label>比赛ID</label>
          <input class="modal-input" id="modalMatchId" placeholder="请输入比赛ID">
        </div>
        <div class="modal-field conditional-field hidden" id="roomField">
          <label>房间ID</label>
          <input class="modal-input" id="modalRoomId" placeholder="请输入房间ID">
        </div>
        <div class="modal-field">
          <label><span class="required">*</span>日期范围</label>
          <div class="date-range-input">
            <input id="modalStartTime" placeholder="开始时间">
            <span>-</span>
            <input id="modalEndTime" placeholder="结束时间">
          </div>
        </div>
      </div>
      <footer class="modal-foot">
        <button class="btn" id="bannerModalCancel" type="button">取消</button>
        <button class="btn primary" id="bannerModalConfirm" type="button">确定</button>
      </footer>
    </section>
  </div>

  <div class="toast" id="toast">已操作</div>

  <script>
    const banners = [
      ["000000", "世界杯活动首页", "blue", "room", "2026-05-13 00:00:00", "2026-05-16 23:59:59", "online", "admin"],
      ["000000", "Mega Contest 推荐", "dark", "room", "2026-04-29 00:00:00", "2028-06-01 23:59:59", "online", "admin"],
      ["000000", "新手任务引导", "green", "match", "2026-04-22 00:00:00", "2026-06-05 23:59:59", "online", "system"],
      ["000000", "夏季活动 Banner", "orange", "none", "2026-04-19 00:00:00", "2026-04-30 23:59:59", "offline", "admin"],
      ["000000", "热门赛事入口", "blue", "match", "2026-06-01 00:00:00", "2026-07-01 23:59:59", "online", "operator"],
      ["000000", "高奖励玩法推荐", "dark", "activity", "2026-06-03 00:00:00", "2026-06-30 23:59:59", "online", "operator"],
      ["000000", "Winner Take All", "green", "room", "2026-05-20 00:00:00", "2026-06-20 23:59:59", "offline", "admin"],
      ["000000", "限时加奖", "orange", "external", "2026-05-28 00:00:00", "2026-06-12 23:59:59", "online", "system"],
      ["000000", "板球首页轮播一", "blue", "room", "2026-06-05 00:00:00", "2026-06-25 23:59:59", "online", "admin"],
      ["000000", "板球首页轮播二", "green", "match", "2026-06-05 00:00:00", "2026-06-25 23:59:59", "online", "admin"],
      ["000000", "赛前冲刺活动", "dark", "activity", "2026-06-06 00:00:00", "2026-06-18 23:59:59", "offline", "operator"],
      ["000000", "Head-to-Head 专区", "orange", "room", "2026-06-08 00:00:00", "2026-06-22 23:59:59", "online", "admin"],
      ["000000", "新人首赛奖励", "blue", "activity", "2026-06-10 00:00:00", "2026-07-10 23:59:59", "online", "system"],
      ["000000", "4X or Nothing", "dark", "room", "2026-06-11 00:00:00", "2026-06-28 23:59:59", "offline", "operator"],
      ["000000", "锦标赛预热", "dark", "external", "2026-06-15 00:00:00", "2026-07-15 23:59:59", "offline", "system"]
    ].map((row, index) => ({
      index: index + 1,
      tenant: row[0],
      name: row[1],
      imageStyle: row[2],
      jumpType: row[3],
      start: row[4],
      end: row[5],
      status: row[6],
      operator: row[7],
      updatedAt: "2026-06-05 18:30:00"
    }));

    const filters = { bannerName: "", bannerStatus: "", dateRange: "" };
    const el = (id) => document.getElementById(id);
    const statusText = { online: "上架", offline: "下架" };
    const jumpText = { room: "房间", match: "比赛页", none: "无跳转", activity: "活动页", external: "外链" };

    function showToast(text) {
      const toast = el("toast");
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function openBannerModal() {
      el("bannerModal").classList.add("show");
      el("bannerModal").setAttribute("aria-hidden", "false");
      updateJumpFields();
    }

    function closeBannerModal() {
      el("bannerModal").classList.remove("show");
      el("bannerModal").setAttribute("aria-hidden", "true");
    }

    function updateJumpFields() {
      const jumpType = el("modalJumpType").value;
      el("linkField").classList.toggle("hidden", jumpType !== "activity");
      el("matchField").classList.toggle("hidden", jumpType !== "match");
      el("roomField").classList.toggle("hidden", jumpType !== "room");
    }

    function filteredRows() {
      return banners.filter((item) => {
        const name = !filters.bannerName || item.name.toLowerCase().includes(filters.bannerName.toLowerCase());
        const status = !filters.bannerStatus || item.status === filters.bannerStatus;
        return name && status;
      });
    }

    function renderRows() {
      const rows = filteredRows();
      el("countText").textContent = `共 ${rows.length} 条数据`;
      el("rows").innerHTML = rows.map((item) => `
        <tr>
          <td>${item.index}</td>
          <td class="muted">${item.tenant}</td>
          <td class="banner-name" title="${item.name}">${item.name}</td>
          <td><div class="banner-thumb ${item.imageStyle}">Banner ${item.index}</div></td>
          <td><span class="tag ${item.jumpType === "none" ? "gray" : "blue"}">${jumpText[item.jumpType]}</span></td>
          <td>${item.start}</td>
          <td>${item.end}</td>
          <td><span class="tag ${item.status === "online" ? "green" : "gray"}">${statusText[item.status]}</span></td>
          <td>${item.operator}</td>
          <td class="muted">${item.updatedAt}</td>
          <td><button class="op edit">编辑</button><button class="op toggle">${item.status === "online" ? "下架" : "上架"}</button><button class="op delete">删除</button></td>
        </tr>
      `).join("") || `<tr><td colspan="11">暂无Banner数据</td></tr>`;
      document.querySelectorAll(".op").forEach((button) => {
        button.addEventListener("click", () => showToast(button.textContent.trim() + " 已提交"));
      });
    }

    function bindSidebarAccordion() {
      const sections = Array.from(document.querySelectorAll(".menu-section"));
      const closeOthers = (activeSection) => {
        sections.forEach((section) => {
          if (section !== activeSection) section.classList.add("collapsed");
        });
      };
      sections.forEach((section) => {
        const toggle = section.querySelector(".menu-title");
        toggle.addEventListener("click", () => {
          const willOpen = section.classList.contains("collapsed");
          section.classList.toggle("collapsed");
          if (willOpen) closeOthers(section);
        });
      });
      document.querySelectorAll(".submenu-item").forEach((item) => {
        item.addEventListener("click", () => {
          const activeSection = item.closest(".menu-section");
          activeSection.classList.remove("collapsed");
          closeOthers(activeSection);
        });
      });
      const activeSection = document.querySelector(".submenu-item.active")?.closest(".menu-section");
      if (activeSection) {
        activeSection.classList.remove("collapsed");
        closeOthers(activeSection);
      }
    }

    function bind() {
      el("bannerName").addEventListener("input", (event) => filters.bannerName = event.target.value);
      el("bannerStatus").addEventListener("input", (event) => filters.bannerStatus = event.target.value);
      el("dateRange").addEventListener("input", (event) => filters.dateRange = event.target.value);
      el("searchBtn").addEventListener("click", renderRows);
      el("resetBtn").addEventListener("click", () => {
        Object.keys(filters).forEach((key) => filters[key] = "");
        ["bannerName", "bannerStatus", "dateRange"].forEach((id) => el(id).value = "");
        renderRows();
      });
      el("addBannerBtn").addEventListener("click", openBannerModal);
      el("bannerModalClose").addEventListener("click", closeBannerModal);
      el("bannerModalCancel").addEventListener("click", closeBannerModal);
      el("bannerModalConfirm").addEventListener("click", () => {
        closeBannerModal();
        showToast("新增Banner已提交");
      });
      el("bannerModal").addEventListener("click", (event) => {
        if (event.target === el("bannerModal")) closeBannerModal();
      });
      el("modalJumpType").addEventListener("input", updateJumpFields);
      el("bannerImageInput").addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        el("bannerUploadBox").textContent = file.name.length > 12 ? file.name.slice(0, 12) + "..." : file.name;
        el("bannerUploadBox").style.fontSize = "12px";
        showToast("Banner图片已选择");
      });
      document.querySelectorAll(".tab-close").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          button.closest(".tab").remove();
        });
      });
      bindSidebarAccordion();
    }

    renderRows();
    bind();
  </script>
</body>
</html>
