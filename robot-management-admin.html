<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>梦幻体育后台中台 - 机器人管理</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #fff;
      --text: #26313d;
      --muted: #7a8795;
      --line: #e2e8f0;
      --line-strong: #cdd7e3;
      --blue: #2f8df5;
      --green: #67bd51;
      --orange: #f3a946;
      --red: #d65a5a;
      --shadow: 0 6px 18px rgba(32, 45, 59, .08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
    button, input, select { font: inherit; }
    .layout { display: grid; grid-template-columns: 220px minmax(0, 1fr); min-height: 100vh; }
    .sidebar { background: #172331; color: #dbe6ef; border-right: 1px solid #0f1823; padding: 16px 12px; }
    .brand { height: 44px; display: flex; align-items: center; gap: 10px; padding: 0 8px 14px; border-bottom: 1px solid rgba(255,255,255,.1); margin-bottom: 14px; }
    .brand-mark { width: 30px; height: 30px; border-radius: 7px; background: var(--blue); color: #fff; display: grid; place-items: center; font-weight: 900; font-size: 12px; }
    .brand-text strong { display: block; font-size: 14px; line-height: 18px; color: #fff; }
    .brand-text span { display: block; color: #93a5b6; font-size: 12px; line-height: 16px; }
    .menu-section { display: grid; gap: 4px; margin-bottom: 8px; }
    .menu-title { height: 38px; border-radius: 8px; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 9px; padding: 0 10px; color: #f4f8fb; background: #203244; font-weight: 800; font-size: 14px; border: 0; width: 100%; cursor: pointer; text-align: left; }
    .menu-title::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 0 4px rgba(47,141,245,.16); }
    .menu-arrow { color: #9fb1c0; transition: transform .22s ease; font-size: 12px; }
    .menu-section.collapsed .menu-arrow { transform: rotate(-90deg); }
    .submenu { display: grid; gap: 3px; padding: 4px 0 0 22px; max-height: 180px; opacity: 1; overflow: hidden; transform: translateY(0); transition: max-height .24s ease, opacity .18s ease, transform .22s ease, padding-top .22s ease; }
    .menu-section.collapsed .submenu { max-height: 0; opacity: 0; padding-top: 0; transform: translateY(-6px); pointer-events: none; }
    .submenu-item { height: 34px; border-radius: 7px; display: flex; align-items: center; padding: 0 10px; color: #b9c8d5; text-decoration: none; font-size: 13px; }
    .submenu-item.active { color: #fff; background: var(--blue); box-shadow: 0 6px 14px rgba(47,141,245,.22); }

    .shell { min-width: 0; min-height: 100vh; padding: 14px 18px 24px; background: linear-gradient(#f9fbfd 0, #f9fbfd 72px, transparent 72px), var(--bg); }
    .frame { min-width: 0; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
    .topbar { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; border-bottom: 1px solid var(--line); background: #fbfdff; }
    .crumbs { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; }
    .menu-icon { width: 22px; height: 22px; display: grid; place-items: center; color: #4f5c68; font-weight: 800; font-size: 18px; }
    .module-btn { height: 26px; padding: 0 12px; border-radius: 14px; border: 1px solid var(--line); background: #fff; color: #607080; cursor: pointer; font-size: 12px; }
    .tabs { height: 36px; display: flex; align-items: center; gap: 6px; padding: 0 16px; border-bottom: 1px solid var(--line); background: #fff; overflow-x: auto; }
    .tab { height: 24px; border-radius: 13px; border: 1px solid var(--line); background: #fff; padding: 0 8px 0 12px; color: #657386; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; flex: 0 0 auto; }
    .tab-link { color: inherit; text-decoration: none; line-height: 22px; }
    .tab-close { width: 16px; height: 16px; border: 0; border-radius: 50%; background: transparent; color: inherit; cursor: pointer; display: inline-grid; place-items: center; padding: 0; font-size: 12px; line-height: 16px; }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .section-tabs, .sub-tabs { display: flex; align-items: center; gap: 18px; height: 44px; padding: 0 18px; border-bottom: 1px solid var(--line); background: #fff; }
    .section-tab, .sub-tab { height: 44px; border: 0; background: transparent; color: #4f5c68; font-size: 13px; font-weight: 800; cursor: pointer; border-bottom: 2px solid transparent; }
    .section-tab.active, .sub-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .sub-tabs { gap: 8px; height: 42px; padding-top: 8px; align-items: flex-start; }
    .sub-tab { height: 32px; padding: 0 16px; border: 1px solid var(--line); border-radius: 0; background: #fff; color: #566374; }
    .sub-tab.active { color: var(--blue); background: #f3f8ff; border-color: #d3e7ff; border-bottom-color: #d3e7ff; }
    .filter-band { padding: 14px 18px; border-bottom: 1px solid var(--line); background: #fbfcfe; }
    .filters { display: flex; align-items: center; flex-wrap: wrap; gap: 14px 18px; }
    .label { color: #5b6775; font-weight: 700; font-size: 11px; text-align: right; white-space: nowrap; }
    .filter-item { display: grid; grid-template-columns: auto 160px; align-items: center; gap: 8px; min-width: max-content; }
    .filter-item.date { grid-template-columns: auto 220px; }
    .filter-actions { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
    .field { height: 30px; border: 1px solid var(--line-strong); background: #fff; border-radius: 7px; padding: 0 10px; min-width: 0; color: var(--text); outline: none; font-size: 12px; }
    .field::placeholder { color: #b3beca; font-size: 12px; }
    .btn { height: 30px; border: 1px solid var(--line-strong); background: #fff; color: var(--text); border-radius: 7px; padding: 0 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; font-size: 12px; }
    .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 5px 12px rgba(47, 141, 245, .2); }
    .metric-band { display: none; grid-template-columns: repeat(7, minmax(120px, 1fr)); gap: 0; padding: 14px 18px; border-bottom: 1px solid var(--line); background: #fff; }
    .metric-band.show { display: grid; }
    .metric { min-height: 54px; padding: 0 14px; border-right: 1px solid var(--line); display: grid; align-content: center; gap: 6px; }
    .metric:last-child { border-right: 0; }
    .metric span { color: var(--muted); font-size: 12px; font-weight: 700; }
    .metric strong { color: #4f5c68; font-size: 20px; font-weight: 700; letter-spacing: 0; }
    .toolbar { padding: 14px 18px 12px; background: #fff; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line); }
    .pill-btn { height: 30px; border: 1px solid transparent; border-radius: 8px; padding: 0 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .pill-btn.blue { background: #eaf4ff; color: var(--blue); border-color: #c7e0ff; }
    .pill-btn.gray { background: #eef2f6; color: #64748b; border-color: #d8e0ea; }
    .table-wrap { max-width: 100%; padding: 0 18px 18px; background: #fff; overflow: auto; max-height: calc(100vh - 344px); }
    table { width: 100%; border-collapse: collapse; min-width: 2940px; font-size: 12px; }
    .table-wrap.medium-table table { min-width: 1880px; }
    .table-wrap.fit-screen { overflow-x: hidden; }
    .table-wrap.fit-screen table { min-width: 100%; table-layout: fixed; }
    .table-wrap.fit-screen th,
    .table-wrap.fit-screen td { padding: 8px 6px; white-space: normal; line-height: 1.35; word-break: break-word; }
    .table-wrap.fit-screen .tag { min-width: 42px; padding: 0 6px; }
    .table-wrap.fit-screen .op { padding: 0 4px; }
    .table-wrap.team-config table { table-layout: fixed; }
    .table-wrap.placeholder-config table { table-layout: fixed; }
    .table-wrap.team-config .col-seq { width: 42px; }
    .table-wrap.team-config .col-id { width: 58px; }
    .table-wrap.team-config .col-name { width: 112px; }
    .table-wrap.team-config .col-room-id { width: 122px; }
    .table-wrap.team-config .col-room-name { width: 178px; }
    .table-wrap.team-config .col-number { width: 66px; }
    .table-wrap.team-config .col-strategy { width: 58px; }
    .table-wrap.team-config .col-rate { width: 70px; }
    .table-wrap.team-config .col-status { width: 70px; }
    .table-wrap.team-config .col-time { width: 120px; }
    .table-wrap.team-config .col-actions { width: 138px; }
    .table-wrap.placeholder-config .col-seq { width: 42px; }
    .table-wrap.placeholder-config .col-id { width: 58px; }
    .table-wrap.placeholder-config .col-name { width: 108px; }
    .table-wrap.placeholder-config .col-room-id { width: 128px; }
    .table-wrap.placeholder-config .col-room-name { width: 190px; }
    .table-wrap.placeholder-config .col-number { width: 70px; }
    .table-wrap.placeholder-config .col-long-number { width: 86px; }
    .table-wrap.placeholder-config .col-type { width: 66px; }
    .table-wrap.placeholder-config .col-status { width: 66px; }
    .table-wrap.placeholder-config .col-time { width: 120px; }
    .table-wrap.placeholder-config .col-actions { width: 138px; }
    .table-wrap.team-config th,
    .table-wrap.team-config td,
    .table-wrap.placeholder-config th,
    .table-wrap.placeholder-config td { white-space: nowrap; word-break: normal; }
    .table-wrap.team-config .cell-name,
    .table-wrap.team-config .cell-room-name,
    .table-wrap.placeholder-config .cell-name,
    .table-wrap.placeholder-config .cell-room-name { overflow: hidden; text-overflow: ellipsis; }
    .table-wrap.team-config .cell-actions,
    .table-wrap.placeholder-config .cell-actions { white-space: normal; line-height: 1.55; }
    th, td { border: 1px solid var(--line); padding: 9px 10px; text-align: center; vertical-align: middle; white-space: nowrap; }
    th { position: sticky; top: 0; z-index: 2; background: #f8fafc; color: #566374; font-weight: 800; }
    tbody tr:hover td { background: #fbfdff; }
    .muted { color: var(--muted); }
    .link { color: var(--blue); font-weight: 800; text-decoration: none; }
    .tag { display: inline-flex; align-items: center; justify-content: center; min-width: 48px; height: 23px; padding: 0 8px; border-radius: 6px; font-size: 12px; border: 1px solid transparent; font-weight: 800; }
    .tag.green { color: #0c6b3f; background: #c9f2da; border-color: #7ed8a2; }
    .tag.red { color: #9f3030; background: #ffd2d2; border-color: #ea8b8b; }
    .tag.orange { color: #9c5c0d; background: #ffe6bd; border-color: #f5c070; }
    .tag.gray { color: #52606c; background: #e7ecf1; border-color: #cbd5df; }
    .op { border: 0; background: transparent; padding: 0 7px; font-weight: 800; cursor: pointer; color: var(--blue); }
    .summary { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-top: 1px solid var(--line); color: var(--muted); font-size: 13px; background: #fbfcfe; }
    .pager-left, .pager-center, .pager-right { display: flex; align-items: center; gap: 8px; }
    .page-size, .goto-input { height: 30px; border: 1px solid var(--line); background: #fff; border-radius: 8px; color: #657386; font-size: 12px; text-align: center; }
    .page-size { width: 96px; padding: 0 10px; text-align: left; }
    .goto-input { width: 52px; }
    .page-btn { min-width: 30px; height: 30px; border: 1px solid var(--line); border-radius: 8px; background: #f7f9fc; color: #657386; cursor: pointer; font-size: 12px; font-weight: 700; }
    .page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 4px 10px rgba(47,141,245,.22); }
    .page-btn.ghost { color: #a8b3bf; background: #f3f6fa; }
    .page-ellipsis { color: #657386; font-weight: 800; padding: 0 2px; }
    .toast { position: fixed; right: 22px; bottom: 22px; background: #192533; color: #fff; padding: 12px 14px; border-radius: 8px; box-shadow: var(--shadow); opacity: 0; transform: translateY(70px); transition: all .18s ease; font-size: 13px; }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>

</head>

  <script>
    const robots = Array.from({ length: 20 }, (_, index) => {
      const templateId = index < 5 ? "8" : index < 12 ? "1" : String(2 + index % 6);
      const templateName = templateId === "8" ? "sake 3duiwu" : templateId === "1" ? "热门-001" : "Mega 常规";
      const type = ["template", "copy", "random"][index % 3];
      const status = ["cancelled", "joined", "pending"][index % 3];
      return {
        index: index + 1,
        robotId: index < 10 ? "" : `RBT${2000 + index}`,
        matchId: "97165",
        templateId,
        templateName,
        ruleName: index % 2 === 0 ? "最强的队伍" : "最强的队伍_copy",
        roomId: index < 5 ? "2061993013370552322" : "2061993013353775105",
        robotTeamId: index % 4 === 0 ? "" : `2062814088804016${String(120 + index).padStart(2, "0")}`,
        userId: "4kskw9s",
        userTeamId: "2062814088804016129",
        strategy: ["A", "B", "C"][index % 3],
        type,
        taskSource: index % 5 === 0 ? "manual" : "system",
        robotSource: index % 4 === 0 ? "系统占位" : "跟入",
        status,
        reason: status === "cancelled" ? "加入时间窗口已过" : "-",
        userJoinAt: `2026/6/5 16:29:${index < 5 ? "57" : "51"}`,
        robotJoinAt: status === "joined" ? `2026/6/5 16:30:${String(12 + index).padStart(2, "0")}` : "-",
        delay: status === "joined" ? 15 + index : "-"
      };
    });

    function renderRoomRows() {

    function renderPlaceholderRows() {

        <tr>

          <td>${r.teamMultiple}</td>
          <td>${r.teamCount}</td>

          <td>${r.endJoinMinute}</td>
          <td>${r.frequencySeconds}</td>
          <td>${r.frequencyCount}</td>

          <td><span class="tag ${r.status === "enabled" ? "green" : "gray"}">${placeholderStatusText[r.status]}</span></td>
          <td>${r.createdAt}</td>
          <td class="cell-actions"><button class="op toggle">${r.status === "enabled" ? "停用" : "启用"}</button><button class="op">编辑</button><button class="op toggle">复制</button><button class="op delete">删除</button></td>
        </tr>
      `).join("") || `<tr><td colspan="15">暂无机器人占位配置数据</td></tr>`;
      document.querySelectorAll(".op").forEach((button) => button.addEventListener("click", () => showToast(button.textContent.trim() + " 已提交")));
      bindToolbarButtons();
    }

    function renderTeamConfigRows() {
      const rows = filteredTeamConfigRules();
      const visibleRows = rows.slice(0, PAGE_SIZE);
      setTableMode("team");
      setTableCols(`
        <col class="col-seq"><col class="col-id"><col class="col-name"><col class="col-room-id"><col class="col-room-name">
        <col class="col-number"><col class="col-number"><col class="col-strategy"><col class="col-number">
        <col class="col-rate"><col class="col-number"><col class="col-rate"><col class="col-number"><col class="col-rate"><col class="col-number">
        <col class="col-status"><col class="col-time"><col class="col-actions">
      `);
      el("metricBand").classList.remove("show");
      el("toolbar").style.display = "flex";
      el("toolbar").innerHTML = `<button class="pill-btn blue">新增</button>`;
      el("tableHead").innerHTML = `<tr><th>序号</th><th>规则ID</th><th>规则名称</th><th>房间ID</th><th>房间名称</th><th>需生成队伍数</th><th>跟入队伍模板数</th><th>阵容策略</th><th>同队伍可使用次数</th><th>积极型占比(%)</th><th>积极性队伍可生成数</th><th>均衡型占比(%)</th><th>均衡性队伍可生成数</th><th>消极型占比(%)</th><th>消极性队伍可生成数</th><th>状态</th><th>创建时间</th><th>操作</th></tr>`;
      el("countText").textContent = `共 ${rows.length} 条数据`;
      el("rows").innerHTML = visibleRows.map((r) => `
        <tr>
          <td>${r.index}</td>
          <td>${r.ruleId}</td>
          <td class="cell-name">${r.ruleName}</td>
          <td>${r.roomId}</td>
          <td class="cell-room-name">${r.roomName}</td>
          <td>${r.needTeams}</td>
          <td>${r.templateTeams}</td>
          <td>${r.strategy}</td>
          <td>${r.reuseTimes}</td>
          <td>${r.aggressiveRate}</td>
          <td>${r.aggressiveTeams}</td>
          <td>${r.balancedRate}</td>
          <td>${r.balancedTeams}</td>
          <td>${r.passiveRate}</td>
          <td>${r.passiveTeams}</td>
          <td><span class="tag ${r.status === "enabled" ? "green" : "gray"}">${placeholderStatusText[r.status]}</span></td>
          <td>${r.createdAt}</td>
          <td class="cell-actions"><button class="op toggle">${r.status === "enabled" ? "停用" : "启用"}</button><button class="op">编辑</button><button class="op toggle">复制</button><button class="op delete">删除</button></td>
        </tr>
      `).join("") || `<tr><td colspan="19">暂无机器人队伍配置数据</td></tr>`;
      document.querySelectorAll(".op").forEach((button) => button.addEventListener("click", () => showToast(button.textContent.trim() + " 已提交")));

    }

    function renderMatchRows() {
      const rows = filteredMatchStats();
      const visibleRows = rows.slice(0, PAGE_SIZE);
      setTableMode("fit");
      setTableCols();
      el("metricBand").classList.add("show");
      renderMatchMetrics(rows);
      el("toolbar").style.display = "none";
      el("tableHead").innerHTML = `<tr><th>序号</th><th>赛事ID</th><th>赛事名称</th><th>赛事状态</th><th>投注金额</th><th>返奖金额</th><th>收益率</th><th>机器人参与房间数</th><th>机器人创建队伍数</th><th>机器人获奖队伍数</th><th>获奖率</th><th>比赛开始时间</th><th>操作</th></tr>`;
      el("countText").textContent = `共 ${rows.length} 条数据`;
      el("rows").innerHTML = visibleRows.map((r) => `
        <tr>
          <td>${r.index}</td>
          <td>${r.matchId}</td>
          <td>${r.matchName}</td>
          <td><span class="tag ${r.matchStatus === "active" ? "green" : r.matchStatus === "notStarted" ? "blue" : r.matchStatus === "ended" ? "gray" : "red"}">${matchStatusText[r.matchStatus]}</span></td>
          <td>${r.stakeAmount}</td>
          <td>${r.returnAmount}</td>
          <td>${r.yieldRate}</td>
          <td>${r.joinedRooms}</td>
          <td>${r.createdTeams}</td>
          <td>${r.wonTeams}</td>
          <td>${r.winRate}</td>
          <td>${r.startAt}</td>
          <td><button class="op">详情</button></td>
        </tr>
      `).join("") || `<tr><td colspan="13">暂无赛事维度统计数据</td></tr>`;
      document.querySelectorAll(".op").forEach((button) => button.addEventListener("click", () => showToast("详情已提交")));
    }

    function bindSidebarAccordion() {
      const sections = Array.from(document.querySelectorAll(".menu-section"));
      const closeOthers = (activeSection) => {
        sections.forEach((section) => {
          if (section !== activeSection) section.classList.add("collapsed");
        });
      };
      sections.forEach((section) => {
        const toggle = section.querySelector(".menu-title");
        toggle.addEventListener("click", () => {
          const willOpen = section.classList.contains("collapsed");
          section.classList.toggle("collapsed");
          if (willOpen) closeOthers(section);
        });
      });
      document.querySelectorAll(".submenu-item").forEach((item) => {
        item.addEventListener("click", () => {
          const activeSection = item.closest(".menu-section");
          activeSection.classList.remove("collapsed");
          closeOthers(activeSection);
        });
      });
      const activeSection = document.querySelector(".submenu-item.active")?.closest(".menu-section");
      if (activeSection) {
        activeSection.classList.remove("collapsed");
        closeOthers(activeSection);
      }
    }

    function bindToolbarButtons() {
      document.querySelectorAll(".pill-btn").forEach((button) => {
        button.addEventListener("click", () => showToast(button.textContent.trim() + " 已提交"));
      });
    }

    function switchSubView(view) {
      activeMainView = "list";
      activeSubView = view;
      Object.keys(filters).forEach((key) => filters[key] = "");
      document.querySelector(".sub-tabs").style.display = "flex";
      document.querySelectorAll(".sub-tab").forEach((tab) => tab.classList.remove("active"));
      const activeLabel = view === "stats" ? "机器人统计" : view === "room" ? "房间维度统计" : view === "match" ? "赛事维度统计" : "机器人队伍明细";
      Array.from(document.querySelectorAll(".sub-tab")).find((tab) => tab.textContent.trim() === activeLabel)?.classList.add("active");
      if (view === "stats") {
        renderStatsFilters();
      } else if (view === "room") {
        renderRoomFilters();
      } else if (view === "match") {
        renderMatchFilters();
      } else {
        renderDetailFilters();
      }
      bindDynamicFilters();
      renderRows();
    }

    function switchMainView(view) {
      activeMainView = view;
      Object.keys(filters).forEach((key) => filters[key] = "");
      document.querySelectorAll(".section-tab").forEach((tab) => tab.classList.remove("active"));
      const activeLabel = view === "placeholder" ? "机器人占位配置" : view === "team" ? "机器人队伍配置" : "机器人列表";
      Array.from(document.querySelectorAll(".section-tab")).find((tab) => tab.textContent.trim() === activeLabel)?.classList.add("active");
      if (view === "placeholder") {
        document.querySelector(".sub-tabs").style.display = "none";
        renderPlaceholderFilters();
        bindDynamicFilters();
        renderPlaceholderRows();
        return;
      }
      if (view === "team") {
        document.querySelector(".sub-tabs").style.display = "none";
        renderTeamConfigFilters();
        bindDynamicFilters();
        renderTeamConfigRows();
        return;
      }
      document.querySelector(".sub-tabs").style.display = "flex";
      switchSubView("detail");
    }

    function bind() {
      bindDynamicFilters();
      bindToolbarButtons();
      document.querySelectorAll(".section-tab").forEach((button) => {
        button.addEventListener("click", () => {
          const text = button.textContent.trim();
          if (text === "机器人列表") {
            switchMainView("list");
            return;
          }
          if (text === "机器人占位配置") {
            switchMainView("placeholder");
            return;
          }
          if (text === "机器人队伍配置") {
            switchMainView("team");
            return;
          }
          showToast(text + " 已提交");
        });
      });
      document.querySelectorAll(".sub-tab").forEach((button) => {
        button.addEventListener("click", () => {
          const text = button.textContent.trim();
          if (text === "机器人统计") {
            switchSubView("stats");
            return;
          }
          if (text === "机器人队伍明细") {
            switchSubView("detail");
            return;
          }
          if (text === "房间维度统计") {
            switchSubView("room");
            return;
          }
          if (text === "赛事维度统计") {
            switchSubView("match");
            return;
          }
          showToast(text + " 已提交");
        });
      });
      document.querySelectorAll(".tab-close").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          button.closest(".tab").remove();
        });
      });
      bindSidebarAccordion();
    }

    renderRows();
    bind();
  </script>
</body>
</html>
